<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary: honey yellow -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD45A"/><stop offset="0.55" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E00"/>
    </linearGradient>
    <linearGradient id="body" x1="160" y1="170" x2="360" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF9A2E"/><stop offset="1" stop-color="#FF7A00"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#7A5200" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="240" rx="112" fill="#FFFFFF" opacity="0.10"/>

  <!-- Bee whose belly stripe is a terminal ">_" -->
  <g transform="translate(256 262)">
    <!-- wings -->
    <ellipse cx="-72" cy="-82" rx="58" ry="84" fill="#FFFFFF" opacity="0.92" transform="rotate(-22 -72 -82)"/>
    <ellipse cx="72" cy="-82" rx="58" ry="84" fill="#FFFFFF" opacity="0.92" transform="rotate(22 72 -82)"/>
    <!-- body -->
    <ellipse cx="0" cy="0" rx="122" ry="140" fill="url(#body)" filter="url(#soft)"/>

    <!-- head stripe + eyes -->
    <path d="M-100 -56 q100 -40 200 0 v24 q-100 -40 -200 0 z" fill="#241712"/>
    <circle cx="-40" cy="-92" r="11" fill="#241712"/>
    <circle cx="40" cy="-92" r="11" fill="#241712"/>

    <!-- terminal belly: caret ">" + underscore "_" -->
    <path d="M-72 6 L-30 36 L-72 66" fill="none" stroke="#241712" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="70" x2="74" y2="70" stroke="#241712" stroke-width="20" stroke-linecap="round"/>

    <!-- bottom stripe -->
    <path d="M-78 104 q78 -24 156 0 v20 q-78 -24 -156 0 z" fill="#241712"/>

    <!-- antennae -->
    <path d="M-30 -132 q-16 -34 -44 -40" stroke="#241712" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M30 -132 q16 -34 44 -40" stroke="#241712" stroke-width="10" fill="none" stroke-linecap="round"/>
    <circle cx="-78" cy="-180" r="11" fill="#241712"/>
    <circle cx="78" cy="-180" r="11" fill="#241712"/>
  </g>
</svg>
